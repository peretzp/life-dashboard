<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Coordination — PracticeLife OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
      background: #0a0e14;
      color: #c7cdd8;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #39bae6;
      font-weight: 500;
    }
    h2 {
      font-size: 18px;
      margin: 30px 0 15px 0;
      color: #59c2ff;
      font-weight: 500;
    }
    .section {
      background: #14191f;
      border: 1px solid #1f2933;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /* Agent Grid */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .agent-card {
      background: #1a1f26;
      border: 1px solid #2a3340;
      border-radius: 6px;
      padding: 15px;
      position: relative;
    }
    .agent-card.active { border-left: 3px solid #4caf50; }
    .agent-card.parked { border-left: 3px solid #ffc107; }
    .agent-card.stuck { border-left: 3px solid #f44336; }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .agent-name {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }
    .agent-status {
      font-size: 24px;
      line-height: 1;
    }
    .agent-meta {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .agent-focus {
      font-size: 13px;
      color: #c9d1d9;
      margin-bottom: 10px;
      font-style: italic;
    }
    .agent-stats {
      display: flex;
      gap: 15px;
      font-size: 11px;
      color: #8b949e;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a3340;
    }
    .agent-stat { display: flex; flex-direction: column; }
    .agent-stat-value { font-size: 14px; color: #e6edf3; font-weight: 600; }
    .agent-stat-label { margin-top: 2px; }

    .agent-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #3a4652;
      background: #21262d;
      color: #c9d1d9;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #30363d;
      border-color: #4a5662;
    }
    .btn-primary {
      background: #238636;
      border-color: #238636;
      color: white;
    }
    .btn-primary:hover {
      background: #2ea043;
      border-color: #2ea043;
    }

    /* Summary Bar */
    .summary {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .summary-value {
      font-size: 24px;
      font-weight: 600;
      color: #e6edf3;
    }
    .summary-label {
      color: #8b949e;
    }

    /* Spawn Form */
    .spawn-form {
      display: grid;
      gap: 15px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
      color: #e6edf3;
    }
    input, select, textarea {
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 30px;
    }
    .timeline-item {
      position: relative;
      padding-bottom: 20px;
      border-left: 2px solid #2a3340;
      padding-left: 20px;
      margin-left: 10px;
    }
    .timeline-item:last-child { border-left: none; }
    .timeline-dot {
      position: absolute;
      left: -11px;
      top: 5px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #238636;
      border: 3px solid #0a0e14;
    }
    .timeline-content {
      font-size: 13px;
    }
    .timeline-time {
      color: #8b949e;
      font-size: 11px;
      margin-bottom: 5px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #1f2933;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    footer a {
      color: #39bae6;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Agent Coordination</h1>

    <div class="section">
      <div class="summary" id="summary">
        <div class="summary-item">
          <div class="summary-value" id="total-agents">—</div>
          <div class="summary-label">Total</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="active-agents" style="color: #4caf50">—</div>
          <div class="summary-label">Active</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="parked-agents" style="color: #ffc107">—</div>
          <div class="summary-label">Parked</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="recent-agents" style="color: #2196f3">—</div>
          <div class="summary-label">Recent</div>
        </div>
      </div>
    </div>

    <h2>Active Agents</h2>
    <div class="agent-grid" id="agent-grid">
      <div class="loading">Loading agents...</div>
    </div>

    <h2>Spawn New Agent</h2>
    <div class="section">
      <form class="spawn-form" onsubmit="spawnAgent(event)">
        <div class="form-group">
          <label>Agent Name</label>
          <input type="text" id="agent-name" placeholder="The Watcher" required>
        </div>
        <div class="form-group">
          <label>Model</label>
          <select id="agent-model">
            <option value="sonnet">Sonnet 4.5 (Default — balanced cost/quality)</option>
            <option value="opus">Opus 4.6 (Premium — max quality)</option>
            <option value="haiku">Haiku 4.5 (Fast — lowest cost)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Focus / Mission</label>
          <input type="text" id="agent-focus" placeholder="Monitor services and report anomalies" required>
        </div>
        <div class="form-group">
          <label>Detailed Prompt (Optional)</label>
          <textarea id="agent-prompt" placeholder="You are The Watcher. Your mission is to..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Spawn Agent</button>
      </form>
    </div>

    <h2>Recent Handoffs</h2>
    <div class="section">
      <div class="timeline" id="handoffs">
        <div class="loading">Loading handoffs...</div>
      </div>
    </div>

    <footer>
      <a href="/">← Back to Dashboard</a> |
      <a href="/api">API Docs</a> |
      Auto-refresh: 30s
    </footer>
  </div>

  <script>
    // Fetch agent health data
    async function loadAgents() {
      try {
        const response = await fetch('https://localhost:3001/api/agents/health');
        const data = await response.json();

        // Update summary
        document.getElementById('total-agents').textContent = data.summary.total;
        document.getElementById('active-agents').textContent = data.summary.active;
        document.getElementById('parked-agents').textContent = data.summary.parked;
        document.getElementById('recent-agents').textContent = data.summary.recentlyActive;

        // Render agent cards
        const grid = document.getElementById('agent-grid');
        if (data.agents.length === 0) {
          grid.innerHTML = '<div class="loading">No agents found</div>';
          return;
        }

        grid.innerHTML = data.agents.map(agent => {
          const statusIcon = agent.status === 'Active' ? '🟢' :
                           agent.status === 'Parked' ? '💤' :
                           agent.ageMs && agent.ageMs < 3600000 ? '🟡' : '⚪';

          const statusClass = agent.status === 'Active' ? 'active' :
                            agent.status === 'Parked' ? 'parked' : '';

          const ageMinutes = agent.ageMs ? Math.floor(agent.ageMs / 60000) : null;
          const ageDisplay = ageMinutes !== null ?
            (ageMinutes < 60 ? `${ageMinutes}m ago` : `${Math.floor(ageMinutes/60)}h ago`) :
            'Unknown';

          return `
            <div class="agent-card ${statusClass}">
              <div class="agent-header">
                <div class="agent-name">${agent.name}</div>
                <div class="agent-status">${statusIcon}</div>
              </div>
              <div class="agent-meta">
                ${agent.model || 'Unknown model'} • ${agent.id || 'No ID'}
              </div>
              <div class="agent-focus">${agent.focus || 'No focus defined'}</div>
              <div class="agent-stats">
                <div class="agent-stat">
                  <div class="agent-stat-value">${agent.status || 'Unknown'}</div>
                  <div class="agent-stat-label">Status</div>
                </div>
                <div class="agent-stat">
                  <div class="agent-stat-value">${ageDisplay}</div>
                  <div class="agent-stat-label">Last activity</div>
                </div>
              </div>
              <div class="agent-actions">
                ${agent.sessionLog ? `<button class="btn" onclick="viewLog('${agent.sessionLog}')">View Log</button>` : ''}
                ${agent.status === 'Active' ? '<button class="btn" onclick="parkAgent(\'' + agent.name + '\')">Park</button>' : ''}
                ${agent.status === 'Parked' ? '<button class="btn btn-primary" onclick="resumeAgent(\'' + agent.name + '\')">Resume</button>' : ''}
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        document.getElementById('agent-grid').innerHTML =
          `<div class="loading">Error loading agents: ${err.message}</div>`;
      }
    }

    // Spawn new agent
    function spawnAgent(event) {
      event.preventDefault();
      const name = document.getElementById('agent-name').value;
      const model = document.getElementById('agent-model').value;
      const focus = document.getElementById('agent-focus').value;
      const prompt = document.getElementById('agent-prompt').value;

      alert(`Agent spawning not yet implemented.\n\nPlanned:\n- Name: ${name}\n- Model: ${model}\n- Focus: ${focus}\n\nFor now, open new iTerm tab and type: cc`);
    }

    // View session log
    function viewLog(logName) {
      window.open(`https://localhost:3001/api/agents/sessions/${logName}`, '_blank');
    }

    // Park agent
    function parkAgent(name) {
      alert(`Parking "${name}" not yet implemented.\n\nFor now, tell the agent to execute /park protocol.`);
    }

    // Resume agent
    function resumeAgent(name) {
      alert(`Resuming "${name}" not yet implemented.\n\nFor now, open new iTerm tab, type cc, and resume the agent.`);
    }

    // Initial load and auto-refresh
    loadAgents();
    setInterval(loadAgents, 30000); // Refresh every 30s
  </script>
</body>
</html>
